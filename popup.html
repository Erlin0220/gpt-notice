<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT 任务提醒</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <img class="logo" src="icons/chatgpt.png" alt="ChatGPT" />
        <div>
          <h1>ChatGPT 任务提醒</h1>
          <p id="summary">正在读取任务状态…</p>
        </div>
      </header>

      <section id="permissionWarning" class="warning hidden">
        Chrome 或 Windows 已关闭扩展通知，请在系统通知设置中允许 Chrome 通知。
      </section>

      <section class="panel settings">
        <label>
          <span>关闭标签后继续监控</span>
          <input type="checkbox" data-setting="autoKeepAlive" />
        </label>
        <label>
          <span>后台标签异常时自动恢复</span>
          <input type="checkbox" data-setting="autoRecoverDiscardedTab" />
        </label>
        <label>
          <span>任务完成后清理后台标签</span>
          <input type="checkbox" data-setting="closeMonitorWhenDone" />
        </label>
        <label>
          <span>完成后保留时间</span>
          <select data-setting="completedTabGraceSeconds">
            <option value="0">立即关闭</option>
            <option value="15">15 秒</option>
            <option value="30">30 秒</option>
            <option value="60">60 秒</option>
            <option value="120">2 分钟</option>
          </select>
        </label>
        <label>
          <span>任务完成提醒</span>
          <input type="checkbox" data-setting="notifyCompleted" />
        </label>
        <label>
          <span>等待操作提醒</span>
          <input type="checkbox" data-setting="notifyAttention" />
        </label>
        <label>
          <span>失败或断开提醒</span>
          <input type="checkbox" data-setting="notifyFailed" />
        </label>
        <label>
          <span>ChatGPT 在前台时也提醒</span>
          <input type="checkbox" data-setting="notifyWhenFocused" />
        </label>
      </section>

      <div class="actions">
        <button id="testButton" class="primary">测试 Windows 通知</button>
        <button id="openChatButton">打开 ChatGPT</button>
      </div>

      <section class="task-section">
        <div class="section-title">
          <h2>最近任务</h2>
          <button id="clearButton" class="text-button">清理记录</button>
        </div>
        <div id="taskList" class="task-list"></div>
      </section>

      <footer>
        关闭任务标签后，扩展会在现有 Chrome 窗口的折叠“GPT 后台”标签组中继续监控，不再创建独立任务栏窗口。完全退出 Chrome 后无法继续监控。
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
