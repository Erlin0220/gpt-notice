name: Apply v0.4.0 feature branch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feat/v0.4-background-tab-group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.4-background-tab-group
          fetch-depth: 0

      - name: Check whether implementation is already applied
        id: pending
        run: |
          if [[ -f .github/workflows/apply-v0.4.0.yml ]]; then
            echo 'needed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'needed=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Extract embedded source archive
        if: steps.pending.outputs.needed == 'true'
        run: |
          set +e
          python3 <<'PY' > .v040-diagnostic.txt 2>&1
          from pathlib import Path
          import base64, gzip, hashlib, io, tarfile, traceback
          try:
              lines = Path('.github/workflows/apply-v0.4.0.yml').read_text(encoding='utf-8').splitlines()
              start = next(i for i, line in enumerate(lines) if "<<'ARCHIVE'" in line) + 1
              end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'ARCHIVE')
              payload = ''.join(line.strip() for line in lines[start:end] if line.strip())
              print('payload_length=', len(payload))
              print('payload_prefix=', repr(payload[:40]))
              print('payload_suffix=', repr(payload[-40:]))
              print('payload_sha256=', hashlib.sha256(payload.encode('ascii', 'replace')).hexdigest())
              raw = base64.b64decode(payload, validate=True)
              print('decoded_length=', len(raw))
              print('decoded_sha256=', hashlib.sha256(raw).hexdigest())
              gzip.decompress(raw)
              print('gzip_test=ok')
              with tarfile.open(fileobj=io.BytesIO(raw), mode='r:gz') as archive:
                  names = archive.getnames()
                  print('tar_entries=', len(names))
                  print('\n'.join(names[:20]))
                  archive.extractall('.')
              print('extract=ok')
          except Exception:
              traceback.print_exc()
              raise
          PY
          STATUS=$?
          cat .v040-diagnostic.txt
          if [[ "$STATUS" -ne 0 ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .v040-diagnostic.txt
            git commit -m 'test: capture v0.4.0 archive diagnostic' || true
            git push origin feat/v0.4-background-tab-group || true
            exit "$STATUS"
          fi
          rm -f .v040-diagnostic.txt

      - name: Validate v0.4.0
        if: steps.pending.outputs.needed == 'true'
        run: |
          set -euo pipefail
          node --check background.js
          node --check background-utils.js
          node --check background-tab-groups.js
          node --check background-monitor-tabs.js
          node --check background-watchdog.js
          node --check background-actions.js
          node --check background-events.js
          node --check content.js
          node --check popup.js
          node tests/static.test.js
          node tests/background.test.js
          python3 -m json.tool manifest.json >/dev/null
          test -s icons/chatgpt.png

      - name: Commit implementation
        if: steps.pending.outputs.needed == 'true'
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v0.4.0.yml .github/workflows/kick-v0.4.0.yml .v040-trigger .v040-diagnostic.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: replace popup monitor window with background tab group'
          git push origin feat/v0.4-background-tab-group
