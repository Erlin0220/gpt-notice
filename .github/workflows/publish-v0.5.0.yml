name: Publish v0.5.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.5.0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate extension
        run: |
          set -euo pipefail
          node --check background.js
          node --check background-utils.js
          node --check background-tab-groups.js
          node --check background-monitor-tabs.js
          node --check background-watchdog.js
          node --check background-actions.js
          node --check background-events.js
          node --check queue-core.js
          node --check content.js
          node --check queue.js
          node --check popup.js
          node tests/static.test.js
          node tests/background.test.js
          node tests/queue.test.js
          python3 -m json.tool manifest.json >/dev/null
          test -s icons/chatgpt.png

      - name: Package extension
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/chatgpt-task-notifier
          rsync -a ./ dist/chatgpt-task-notifier/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'dist/' \
            --exclude 'node_modules/'
          cd dist
          zip -qr chatgpt-task-notifier-v0.5.0.zip chatgpt-task-notifier
          sha256sum chatgpt-task-notifier-v0.5.0.zip > SHA256SUMS.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create v0.5.0 \
            --target "$GITHUB_SHA" \
            --title "ChatGPT 任务完成提醒 v0.5.0" \
            --notes $'## v0.5.0\n\n- 新增按会话持久化的消息队列。\n- 当前回答完成后自动执行下一条队列消息。\n- 每条消息完成后立即发送 Windows 通知。\n- 支持编辑、删除、排序、暂停、继续和失败重试。\n- 支持页面刷新恢复，并防止同会话多标签重复发送。' \
            dist/chatgpt-task-notifier-v0.5.0.zip \
            dist/SHA256SUMS.txt
